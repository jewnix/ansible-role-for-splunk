---
# Configure default splunk_app_deploy_path based on which group the host is a member of
- name: Set default splunk_app_deploy_path for clustermanager hosts
  ansible.builtin.set_fact:
    splunk_app_deploy_path: etc/master-apps
  when: "'clustermanager' in group_names"

- name: Set default splunk_app_deploy_path for shdeployer hosts
  ansible.builtin.set_fact:
    splunk_app_deploy_path: etc/shcluster/apps
  when: "'shdeployer' in group_names"

- name: Set default splunk_app_deploy_path for deploymentserver hosts
  ansible.builtin.set_fact:
    splunk_app_deploy_path: etc/deployment-apps
  when: "'deploymentserver' in group_names"

- name: "Set default splunk_app_deploy_path all other hosts"
  ansible.builtin.set_fact:
    splunk_app_deploy_path: "etc/apps"
  when:
    - "'clustermanager' not in group_names"
    - "'shdeployer' not in group_names"
    - "'deploymentserver' not in group_names"

# Prep the Ansible host to deploy apps then install them
- block:
    - name: Create local directory for managing repos on the target host
      ansible.builtin.file:
        path: "{{ git_local_clone_path }}{{ ansible_nodename }}"
        state: directory
      delegate_to: localhost
      changed_when: false

    - name: Install .rsync-filter to avoid copying undesirable files and folders to the target host later
      ansible.builtin.copy:
        src: rsync-filter
        dest: "{{ git_local_clone_path }}{{ ansible_nodename }}/.rsync-filter"
      delegate_to: localhost
      changed_when: false

    - name: Download defined Git repos to local Ansible host
      ansible.builtin.git:
        accept_hostkey: true
        repo: "{{ item.git_server | default(git_server) }}/{{ item.git_project | default(git_project) }}/{{ item.name }}"
        version: "{{ item.git_version | default(git_version) }}"
        dest: "{{ git_local_clone_path }}{{ ansible_nodename }}/{{ item.name }}"
        key_file: "{{ git_key }}"
        force: true
      loop: "{{ git_apps }}"
      delegate_to: localhost
      changed_when: false
      check_mode: false
      retries: 10
      delay: 10
      register: git_clone_result
      until: git_clone_result is not failed

    - name: Set ownership of cloned repos to splunk user
      ansible.builtin.file:
        path: "{{ git_local_clone_path }}{{ ansible_nodename }}"
        owner: "{{ splunk_nix_user }}"
        group: "{{ splunk_nix_group }}"
        recurse: true
      delegate_to: localhost
      become: true
      changed_when: false

    - name: Ensure rsync is installed on target host
      ansible.builtin.package:
        name: rsync
        state: present
        update_cache: true
      become: true

    - name: "Comment out requiretty in sudoers as it causes synchronize to fail on target host"
      ansible.builtin.lineinfile:
        dest: "/etc/sudoers"
        state: present
        regexp: "^#?{{ item }}"
        line: "#{{ item }}"
        create: true
        owner: root
        group: root
        mode: "0440"
      loop:
        - "Defaults    requiretty"
      become: true

    - name: Check if correct vars are defined for SHC app management
      block:
        - name: Trigger failure if target_shc_group_name var is undefined
          ansible.builtin.fail:
            msg: "Please add a target_shc_group_name variable to the host_vars for your SH Deployer host(s) before proceeding."
          when: target_shc_group_name is not defined

        - name: Trigger failure if splunk_admin_username var is undefined
          ansible.builtin.fail:
            msg: "Please add a splunk_admin_username variable to the host_vars for your SHC hosts before proceeding."
          when: splunk_admin_username is not defined

        - name: Trigger failure if splunk_admin_password var is undefined
          ansible.builtin.fail:
            msg:
              - "Please add a splunk_admin_password variable to the host_vars or group_vars for your SHC hosts before proceeding."
              - "Tip: To encrypt the var value, you can use: ansible-vault encrypt_string --ask-vault-pass 'var_value_to_encrypt' --name 'splunk_admin_password' then, use the --ask-vault-pass argument when running the play."
          when: splunk_admin_password is not defined

        - name: Get SHC status from first SH under the "target_shc_group_name" inventory group specified in the shdeployer host_vars
          ansible.builtin.uri:
            url: "https://{{ groups[target_shc_group_name] | first }}:{{ splunkd_port }}/services/shcluster/status"
            method: GET
            user: "{{ splunk_admin_username }}"
            password: "{{ splunk_admin_password }}"
            validate_certs: false
            return_content: true
            status_code: 200
            body: output_mode=json
          check_mode: false
          no_log: true
          changed_when: false
          register: shc_status_response

        - name: Set vars for deployment based on SHC status
          ansible.builtin.set_fact:
            service_ready_state: "{{ shc_status_response.json.entry[0].content.captain.service_ready_flag }}"
            deploy_target: "{{ shc_status_response.json.entry[0].content.captain.mgmt_uri }}"

        - name: Trigger failure if SHC is NOT ready
          ansible.builtin.fail:
            msg: "The SHC has service ready state of FALSE. Please investigate and re-run Ansible play after resolving."
          when:
            - not service_ready_state

      when: "'shdeployer' in group_names"

    - name: Install apps
      ansible.builtin.include_tasks: install_apps.yml
      loop: "{{ git_apps }}"
      vars:
        app_dest: "{{ item.splunk_app_deploy_path | default(splunk_app_deploy_path) }}"
        app_src: "{{ git_local_clone_path }}{{ ansible_nodename }}/{{ item.name }}{{ item.app_relative_path | default(app_relative_path) }}"
        handler: >-
          {{ 'apply indexer cluster bundle' if app_dest == 'etc/master-apps'
              else 'reload deployment server' if app_dest == 'etc/deployment-apps'
              else 'apply shcluster-bundle' if app_dest == 'etc/shcluster/apps'
              else 'restart splunk' }}

    - name: Cleanup the local directory that was used to manage repos on the target host
      ansible.builtin.file:
        path: "{{ git_local_clone_path }}{{ ansible_nodename }}"
        state: absent
      delegate_to: localhost
      changed_when: false

  # Conditional for block
  when:
    - git_apps is defined
    - git_version is defined
    - git_key != 'undefined'
    - git_server != 'undefined'
    - git_project != 'undefined'
